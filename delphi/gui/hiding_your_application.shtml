    <h3>Как скрыть своё приложение</h3>
    <p>Если Вы хотет, чтобы Ваша программа не
    появлялась на панели задач, но форма была видна,
    то воспользуйтесь следующей командой:<br>
    <br>
    ShowWindow (Application.handle, SW_HIDE); <br>
    <br>
    Данная команда в основном используется в
    приложениях, которае активируются через иконку в
    трее.<br>
    </p>
