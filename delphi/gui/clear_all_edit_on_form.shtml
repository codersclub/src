    <h3>Как очистить все окошки редактирования на
    форме</h3>
    <p>Для этого можно воспользоваться следующим
    кодом:</p>
    <pre>

procedure ClearEdits;
 var i : Integer;
begin
for i := 0 to ComponentCount-1 do
  if (Components[i] is TEdit) then
    (Components[i] as TEdit).Text := '';
end;
