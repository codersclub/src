    <h2>Как очистить пункт меню Документы кнопки Пуск</h2>
    <p>Вызовите Windows API функцию SHAddToRecentDocs() передав nil
    вместо имени файла в качестве параметра.</p>
    <p>uses ShlOBJ;<br>
    <br>
    procedure TForm1.Button1Click(Sender: TObject);<br>
    begin<br>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; SHAddToRecentDocs(SHARD_PATH, nil);<br>
    end;</p>
