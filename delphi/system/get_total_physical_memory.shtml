    <h3>Как получить весь размер системной памяти</h3>
    <p>&nbsp;</p>
    <p>function GetMemoryTotalPhys : DWord; <br>
    var <br>
    &nbsp;&nbsp;memStatus: TMemoryStatus; <br>
    begin <br>
    &nbsp;&nbsp;&nbsp;&nbsp; memStatus.dwLength := sizeOf ( memStatus ); <br>
    &nbsp;&nbsp;&nbsp;&nbsp; GlobalMemoryStatus ( memStatus ); <br>
    &nbsp;&nbsp;&nbsp;&nbsp; Result := memStatus.dwTotalPhys; <br>
    end; <br>
    </p>
