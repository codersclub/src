    <h3>Как найти директорию TEMP в Windows</h3>
    <p>function c_GetTempPath: String; <br>
    &nbsp;&nbsp;var <br>
    &nbsp;&nbsp;&nbsp;&nbsp;Buffer: array[0..1023] of Char; <br>
    &nbsp;&nbsp;begin <br>
    &nbsp;&nbsp;&nbsp;&nbsp;SetString(Result, Buffer, GetTempPath(Sizeof(Buffer)-1,Buffer)); <br>
    &nbsp;&nbsp;end; <br>
    <br>
    этот код так же можно использовать для:<br>
    GetCurrentDirectory <br>
    GetSystemDirectory <br>
    GetWindowsDirectory <br>
    <br>
