<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<HTML><HEAD><TITLE>Translit</TITLE>
<META content="text/html; charset=windows-1251" http-equiv=Content-Type>
<SCRIPT language=JavaScript><!--
 var lat=new Array("YO","Yo","JO","Jo","ZH","Zh","I'","Ch","CH","Sh","SH","Sch","SCh","SCH","Xh","XH","Ye","YE","Je","JE","Yu","YU","Ju","JU","Ya","YA","Ja","JA","A","B","V","G","D","E","Z","I","K","L","M","N","O","P","R","S","T","U","F","C","Y","J","H","jo","yo","zh","i'","ch","sh","sch","xh","je","ju","yu","ja","ya","a","b","v","g","d","e","z","i","k","l","m","n","o","p","r","s","t","u","f","h","c","'","y","`","j");
 var cyr=new Array("Ё", "Ё", "Ё", "Ё", "Ж", "Ж", "Й", "Ч", "Ч", "Ш", "Ш", "Щ",  "Щ",  "Щ",  "Щ", "Щ", "Йе","ЙЕ","Э", "Э", "Ю", "Ю", "Ю", "Ю", "Я", "Я", "Я", "Я", "А","Б","В","Г","Д","Е","З","И","К","Л","М","Н","О","П","Р","С","Т","У","Ф","Ц","Ы","Ж","Х","ё", "ё", "ж", "й", "ч", "ш", "щ",  "щ", "э", "ю", "ю", "я", "я", "а","б","в","г","д","е","з","и","к","л","м","н","о","п","р","с","т","у","ф","х","ц","ь","ы","ъ","й");

function formfocus() {
 document.myform.message.focus();
}
function transform(_txt, _from, _to){
 var i;
 for (i=0;i<_from.length;i++){
 _txt=_txt.replace(new RegExp(_from[i],"g"),_to[i]);
 }
 return _txt;
}

function translit(){
 var j;
 txt = document.myform.message.value;
 txt = transform(txt, lat, cyr);
 document.myform.message.value = txt;
 formfocus();
}
function formhelp() {
 window.open('trhelp.htm','show');
}
//--></script>

</HEAD>
<BODY onLoad="formfocus();">

<center>
<h2>Проверка ТрансЛитерации</h2>

<FORM name=myform>
<TEXTAREA name=message cols=80 rows=15 tabIndex=3>
</TEXTAREA>

<BR>

<input type=button 
       onclick="javascript: translit();" style="cursor:hand"
       title="Перевести Ваше сообщение с транслита на русский"
       value="Транслит"> 

<input type="button" name="help" value="Help"
       onclick="formhelp();">

</FORM>

</center>

</BODY></HTML>
