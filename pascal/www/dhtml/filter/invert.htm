<h2>Фильтр "Invert"</h2>
<p>Фильтр Invert меняет оттенок, насыщение и яркость объекта на противоположные


<p><b>Синтаксис:</b><br>
<code>STYLE="filter:invert"</code>
<hr>
<b>Пример</b>
<table>
<tr>
<td>Образец<td>Фильтр
<tr>
<td><IMG SRC="cat.jpg">
<td><IMG SRC="cat.jpg" STYLE=filter:invert()>
</table>
Код для примера
<pre>&lt;IMG SRC="cat.jpg" <b>STYLE=filter:invert()</b>&gt;</pre>


</td>
</tr></table>
