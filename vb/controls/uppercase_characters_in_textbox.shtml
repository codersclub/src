    <h3>Как в Text Box перевести символы в верхний регистр</h3>
    <p>Чтобы перевести текст в верхний регистр в text box,
    можно воспользоваться следующей функцией:</p>
    <pre>Private Sub txtname_KeyPress(KeyAscii As Integer)
		'Изменяем на верхний регистр как только напечатано
		KeyAscii = Asc(UCase(Chr(KeyAscii)))
End Sub</pre>
