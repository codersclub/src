    <h3 align="center"><b>Перемещение элемента или ветви</b></h3>
    <p>Перемещение элемента или ветви есть
    последовательная операция копирования с помощью
    <b>CopyItem() / CopyBranch()</b> и удаления: функция <b>DeleteItem()</b>.
    Заметьте, что при удалении ветви удаляются и все
    принадлежащие ей отростки. </p>
