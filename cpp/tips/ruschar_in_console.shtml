    <h3>Как вывести русский текст в консольном окне</h3>
    <p>Для перекодировки используется функция CharToOem():</p>
    <pre>#include &lt;windows.h&gt;
#include &lt;stdio.h&gt;

void main()
{
	char src[10];
	char dest[10];
	strcpy(src,&quot;Привет&quot;);
	CharToOem(src,dest);
	printf(dest);
}</pre>
