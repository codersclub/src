<p class=q>Как сделать невидимой главную форму?</p>
<p class=ref>Автор: <strong>OlegGG</strong><br>
Исходная ссылка: - - -</p>
<dir>
В WinMain, сразу после "Application->Initialize();", пишем:<br>
<pre class="code">Application<font color="#0000ff">-&gt;</font>ShowMainForm <font color="#0000ff">= </font><font color="#000080">false</font><font color="#0000ff">;
</font></pre>
<br>
