    <h3>Как заменить стандартные кнопки формы на
    картинки</h3>
    <p>Для этого стандартный тэг кнопки нужно
    изменить следующим образом:</p>
    <pre>&lt;INPUT TYPE=&quot;image&quot; SRC=&quot;images/submit.gif&quot; BORDER=&quot;0&quot;&gt;
</pre>
    <p>Незабудьте для таких кнопок-картинок ставить
    атрибут BORDER=&quot;0&quot;, чтобы рамка вокруг кнопки не
    показывалась.</p>
